<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Borrar opinión — Crikitiso Admin</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600;800&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet"/>
  <meta name="robots" content="noindex, nofollow"/>
</head>
<body>

  <nav class="navbar">
    <div class="nav-logo">
      <img src="logo.png" alt="Crikitiso Logo" class="logo-img"/>
      <span class="nav-brand">CRIKITISO</span>
    </div>
  </nav>

  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;margin-top:64px">
    <div style="background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:2.5rem;max-width:480px;width:100%;text-align:center">
      <div id="estado">
        <div style="font-size:2.5rem;margin-bottom:1rem">🗑</div>
        <h2 style="font-family:var(--condensed);font-size:1.8rem;margin-bottom:.8rem">Borrar <span class="accent">opinión</span></h2>
        <div id="infoOpinion" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:1rem;margin-bottom:1.5rem;text-align:left">
          <div style="font-family:var(--mono);font-size:.7rem;color:var(--text-dim);margin-bottom:.4rem">Cargando...</div>
        </div>
        <div style="display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap">
          <button id="btnBorrar" class="btn-primary" onclick="borrar()" style="background:var(--red);border:none">
            🗑 Sí, borrar definitivamente
          </button>
          <a href="admin.html" class="btn-ghost">Cancelar</a>
        </div>
        <div id="tokenError" style="display:none;color:var(--red);font-family:var(--mono);font-size:.8rem;margin-top:1rem">
          ✗ Enlace inválido o expirado.
        </div>
      </div>
      <div id="estadoOk" style="display:none">
        <div style="font-size:2.5rem;margin-bottom:1rem">✅</div>
        <h2 style="font-family:var(--condensed);font-size:1.8rem;color:var(--green)">Opinión borrada</h2>
        <p style="color:var(--text-dim);margin-top:.8rem">La opinión ha sido eliminada de la base de datos.</p>
        <a href="admin.html" class="btn-primary" style="display:inline-block;margin-top:1.5rem">Ir al panel →</a>
      </div>
      <div id="estadoError" style="display:none">
        <div style="font-size:2.5rem;margin-bottom:1rem">❌</div>
        <h2 style="font-family:var(--condensed);font-size:1.8rem;color:var(--red)">Error al borrar</h2>
        <p style="color:var(--text-dim);margin-top:.8rem">Inténtalo desde el panel de admin.</p>
        <a href="admin.html" class="btn-primary" style="display:inline-block;margin-top:1.5rem">Ir al panel →</a>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://bmdfgomboisosbqylmfs.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJtZGZnb21ib2lzb3NicXlsbWZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzY2OTAsImV4cCI6MjA4OTUxMjY5MH0.yzYKz1OlwbY_mcv-z2X1XKcAmcDiHInmvmu7ns_aC0Y';
    const H = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' };
    const SECRET = 'Crikitiso@Proyecto1';
    const COL = { puntuacion: 'punctuation', opinion: 'nombre opinion', reportada: 'nombre reportada' };

    // Obtener params de la URL
    const params = new URLSearchParams(window.location.search);
    const id    = params.get('id');
    const token = params.get('token');

    // Verificar token: sha simple = btoa(id + SECRET)
    function generarToken(id) {
      return btoa(id + SECRET).replace(/=/g, '');
    }

    async function cargarOpinion() {
      if (!id || !token || token !== generarToken(id)) {
        document.getElementById('tokenError').style.display = 'block';
        document.getElementById('btnBorrar').style.display = 'none';
        return;
      }

      const res = await fetch(`${SUPABASE_URL}/rest/v1/valoraciones?id=eq.${id}`, { headers: H });
      const data = res.ok ? await res.json() : [];
      const op = data[0];

      if (!op) {
        document.getElementById('infoOpinion').innerHTML = '<div style="font-family:var(--mono);font-size:.78rem;color:var(--red)">Opinión no encontrada. Puede que ya haya sido borrada.</div>';
        document.getElementById('btnBorrar').style.display = 'none';
        return;
      }

      const stars = [1,2,3,4,5].map(i =>
        `<span style="color:${i <= (op[COL.puntuacion]||0) ? '#fbbf24' : '#333'}">★</span>`
      ).join('');

      document.getElementById('infoOpinion').innerHTML = `
        <div style="font-family:var(--mono);font-size:.7rem;color:var(--orange);margin-bottom:.5rem">ISO: ${op.iso?.toUpperCase()}</div>
        <div style="margin-bottom:.5rem">${stars}</div>
        <div style="font-size:.88rem;color:var(--text)">${op[COL.opinion] || '<em style="color:var(--text-dim)">Sin texto de opinión</em>'}</div>
        <div style="font-family:var(--mono);font-size:.65rem;color:var(--text-dim);margin-top:.6rem">ID: ${op.id} · ${new Date(op.created_at).toLocaleString('es-ES')}</div>
      `;
    }

    async function borrar() {
      if (!id || token !== generarToken(id)) return;
      document.getElementById('btnBorrar').disabled = true;
      document.getElementById('btnBorrar').textContent = 'Borrando...';

      const res = await fetch(`${SUPABASE_URL}/rest/v1/valoraciones?id=eq.${id}`, {
        method: 'DELETE', headers: H
      });

      document.getElementById('estado').style.display = 'none';
      if (res.ok) {
        document.getElementById('estadoOk').style.display = 'block';
      } else {
        document.getElementById('estadoError').style.display = 'block';
      }
    }

    cargarOpinion();
  </script>
</body>
</html>
